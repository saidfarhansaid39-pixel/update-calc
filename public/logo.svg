<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <style>
      @keyframes pulse-bar1 {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(1.15); }
      }
      @keyframes pulse-bar2 {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.85); }
      }
      @keyframes pulse-bar3 {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(1.2); }
      }
      @keyframes pulse-bar4 {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.9); }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 4px rgba(6, 182, 212, 0.3)); }
        50% { filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.6)); }
      }
      @keyframes fade-in {
        0% { opacity: 0; transform: translateX(-8px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      .icon-group { animation: glow 3s ease-in-out infinite; transform-origin: 25px 25px; }
      .bar1 { transform-origin: 8px 28px; animation: pulse-bar1 2.5s ease-in-out infinite; }
      .bar2 { transform-origin: 16px 28px; animation: pulse-bar2 3s ease-in-out infinite; }
      .bar3 { transform-origin: 24px 28px; animation: pulse-bar3 2.8s ease-in-out infinite; }
      .bar4 { transform-origin: 32px 28px; animation: pulse-bar4 3.2s ease-in-out infinite; }
      .brand-text { animation: fade-in 0.8s ease-out forwards; }
      .brand-text span { display: inline-block; opacity: 0; }
      .brand-text span:nth-child(1) { animation: fade-in 0.4s ease-out 0.1s forwards; }
      .brand-text span:nth-child(2) { animation: fade-in 0.4s ease-out 0.2s forwards; }
      .brand-text span:nth-child(3) { animation: fade-in 0.4s ease-out 0.3s forwards; }
      .brand-text span:nth-child(4) { animation: fade-in 0.4s ease-out 0.4s forwards; }
      .brand-text span:nth-child(5) { animation: fade-in 0.4s ease-out 0.5s forwards; }
      .brand-text span:nth-child(6) { animation: fade-in 0.4s ease-out 0.6s forwards; }
    </style>
  </defs>
  <rect width="200" height="50" rx="8" fill="#0f172a"/>
  <g class="icon-group">
    <rect x="4" y="20" width="8" height="16" rx="2" fill="#1a56db" class="bar1"/>
    <rect x="14" y="14" width="8" height="22" rx="2" fill="#06b6d4" class="bar2"/>
    <rect x="24" y="10" width="8" height="26" rx="2" fill="#f59e0b" class="bar3"/>
    <rect x="34" y="6" width="8" height="30" rx="2" fill="#1a56db" opacity="0.7" class="bar4"/>
    <rect x="4" y="6" width="38" height="2" rx="1" fill="#06b6d4" opacity="0.4"/>
  </g>
  <text x="56" y="32" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="22" fill="#f8fafc" letter-spacing="1" class="brand-text">
    <span>J</span><span>D</span><span>C</span><span>A</span><span>L</span><span>C</span>
  </text>
</svg>
