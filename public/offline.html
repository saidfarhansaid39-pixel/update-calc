<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JDCALC - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px; text-align: center;
      background: #f9fafb; color: #333;
    }
    .card {
      background: white; border-radius: 16px; padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 420px;
      border: 1px solid #e5e7eb;
    }
    h1 { font-size: 24px; color: #1a3a8a; margin-bottom: 12px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 8px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .btn {
      display: inline-block; margin-top: 20px; padding: 10px 24px;
      background: #1a3a8a; color: white; border-radius: 8px;
      text-decoration: none; font-size: 14px; font-weight: 500;
      border: none; cursor: pointer;
    }
    .btn:hover { background: #0a1d4f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>JDCALC requires an internet connection for full functionality.</p>
    <p>Previously visited calculators may still be available in your browser cache.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
